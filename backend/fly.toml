# Fly.io config for the backend. Deploy:
#   cd backend
#   fly launch --no-deploy            # creates the app (accept this fly.toml)
#   fly postgres create --name eaap-db && fly postgres attach eaap-db
#   fly secrets set SECRET_KEY=$(openssl rand -hex 32) LLM_PROVIDER=stub \
#       BACKEND_CORS_ORIGINS=https://autonomous-analytics-frontend.vercel.app
#   fly deploy
app = "eaap-backend"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  ENVIRONMENT = "production"
  DEBUG = "false"
  LLM_PROVIDER = "stub"
  LANGFUSE_ENABLED = "false"
  UPLOAD_DIR = "/data/uploads"
  REPORT_DIR = "/data/reports"
  # BACKEND_CORS_ORIGINS is set via `fly secrets set` (see header).

# Run DB migrations on each release.
[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    path = "/health"
    interval = "15s"
    timeout = "3s"
    grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"

[mounts]
  source = "eaap_data"
  destination = "/data"
