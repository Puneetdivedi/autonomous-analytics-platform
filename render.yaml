# Render Blueprint — one-click backend + Postgres.
# Deploy: https://dashboard.render.com  ->  New +  ->  Blueprint  ->  pick this repo.
# (Or use the "Deploy to Render" button in docs/DEPLOYMENT.md.)

databases:
  - name: eaap-db
    plan: free
    databaseName: eaap
    user: eaap

services:
  - type: web
    name: eaap-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    # Run migrations, then serve on the port Render provides.
    dockerCommand: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: eaap-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LLM_PROVIDER
        value: stub          # keyless demo mode; set to openai + add OPENAI_API_KEY for real answers
      - key: LANGFUSE_ENABLED
        value: "false"
      - key: BACKEND_CORS_ORIGINS
        value: https://autonomous-analytics-frontend.vercel.app
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: REPORT_DIR
        value: /data/reports
      # Optional — uncomment and set in the Render dashboard to enable real LLM answers:
      # - key: OPENAI_API_KEY
      #   sync: false
