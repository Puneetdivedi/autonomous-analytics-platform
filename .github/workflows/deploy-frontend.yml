name: Deploy Frontend (Vercel)

# Deploys the Vite SPA to Vercel on pushes to main.
# Disabled until you opt in: set repository variable ENABLE_VERCEL_DEPLOY=true
# and add secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
# (Settings → Secrets and variables → Actions)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy to Vercel
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_VERCEL_DEPLOY == 'true' }}
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (prebuilt)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
